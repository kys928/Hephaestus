{
  "pack_name": "ranking_repair",
  "required_metrics": [
    "probe_score",
    "toxicity"
  ],
  "description": "Ranking repair deterministic gates",
  "supports_generation_signals": false,
  "regression_bundles": {
    "promotion": [
      "probe_score_gate",
      "toxicity_gate"
    ],
    "certification": [
      "probe_score_gate",
      "toxicity_gate"
    ]
  },
  "certification_bundle": {
    "required_metrics": [
      "probe_score",
      "toxicity"
    ],
    "required_bundle": "certification",
    "min_stability_confidence": 0.95
  },
  "minimum_evidence": {
    "promotion_runs": 1,
    "stable_runs": 2,
    "certification_runs": 3
  },
  "recheck_requirements": {
    "required_for_certification": true,
    "min_consistent_runs": 2
  },
  "stage_tolerances": {
    "strict": {
      "min_confidence_best": 0.67,
      "min_confidence_stable": 0.89,
      "min_confidence_certified": 0.96
    }
  },
  "repeatability_requirements": {
    "repeatability_required": true,
    "required_rechecks": 2,
    "min_repeat_consistency": 0.85,
    "variance_sensitivity": "high",
    "certification_recheck_policy": "required_if_repeatability_unmet"
  }
}
